<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Pro - Architetture Distribuite</title>
    <style>
        :root { --primary: #2563eb; --secondary: #64748b; --success: #10b981; --danger: #ef4444; --bg: #f1f5f9; --card: #ffffff; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: #1e293b; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        
        /* Header & Navbar */
        header { display: flex; justify-content: space-between; align-items: center; background: var(--card); padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 25px; }
        .badge { background: #dcfce7; color: var(--success); padding: 5px 12px; border-radius: 20px; font-weight: bold; }
        select { padding: 8px; border-radius: 6px; border: 1px solid #cbd5e1; outline: none; }

        /* Viste */
        .view { display: none; animation: fadeIn 0.3s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Grid Prodotti */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0; transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); }
        .card h3 { margin: 0 0 10px 0; color: #334155; }
        .stock-out { color: var(--danger); font-size: 0.85rem; font-weight: bold; }

        /* Bottoni */
        button { width: 100%; padding: 10px; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        .btn-buy { background: var(--primary); color: white; }
        .btn-buy:disabled { background: #cbd5e1; cursor: not-allowed; }
        .btn-admin { background: var(--secondary); color: white; margin-bottom: 10px; }

        /* Admin Panel */
        .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .admin-card { background: white; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0; }
        input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; }

        #status-msg { position: fixed; bottom: 20px; right: 20px; padding: 15px 25px; border-radius: 8px; color: white; display: none; z-index: 100; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🛒 TechStore</h1>
        <div style="display: flex; gap: 15px; align-items: center;">
            <span class="badge">Crediti: <span id="user-credits">0</span></span>
            <select id="view-mode" onchange="toggleView()">
                <option value="user">Vista Utente</option>
                <option value="admin">Vista Admin</option>
            </select>
        </div>
    </header>

    <div id="user-view" class="view active">
        <div class="grid" id="product-list">
            </div>
    </div>

    <div id="admin-view" class="view">
        <div class="admin-grid">
            <div class="admin-card">
                <h3>Gestione Crediti</h3>
                <p>Assegna bonus istantaneo all'utente.</p>
                <button class="btn-admin" onclick="adminAddCredits()">Regala 50 Crediti</button>
            </div>
            <div class="admin-card">
                <h3>Nuovo Prodotto</h3>
                <input type="text" id="p-name" placeholder="Nome Prodotto">
                <input type="number" id="p-price" placeholder="Prezzo">
                <input type="number" id="p-stock" placeholder="Stock Iniziale">
                <button class="btn-buy" onclick="adminAddProduct()">Aggiungi al Catalogo</button>
            </div>
        </div>
    </div>
</div>

<div id="status-msg"></div>

<script>
    // ⚠️ SOSTITUISCI CON IL TUO URL DI RENDER
    const API_BASE = "https://ecommerce-backend-1234.onrender.com/api";

    function toggleView() {
        const mode = document.getElementById('view-mode').value;
        document.getElementById('user-view').classList.toggle('active', mode === 'user');
        document.getElementById('admin-view').classList.toggle('active', mode === 'admin');
        fetchData();
    }

    function notify(text, isError = false) {
        const el = document.getElementById('status-msg');
        el.innerText = text;
        el.style.background = isError ? '#ef4444' : '#10b981';
        el.style.display = 'block';
        setTimeout(() => el.style.display = 'none', 3000);
    }

    async function fetchData() {
        try {
            const res = await fetch(`${API_BASE}/data`);
            if (!res.ok) throw new Error();
            const data = await res.json();
            updateUI(data);
        } catch (e) {
            notify("Errore di connessione al server", true);
        }
    }

    function updateUI(data) {
        document.getElementById('user-credits').innerText = data.user.credits;
        const list = document.getElementById('product-list');
        list.innerHTML = '';

        data.products.forEach(p => {
            const canBuy = data.user.credits >= p.price && p.stock > 0;
            list.innerHTML += `
                <div class="card">
                    <h3>${p.name}</h3>
                    <p>Prezzo: <b>${p.price} cr</b></p>
                    <p>Stock: ${p.stock > 0 ? p.stock : '<span class="stock-out">ESAURITO</span>'}</p>
                    <button class="btn-buy" onclick="buyItem(${p.id})" ${!canBuy ? 'disabled' : ''}>
                        ${p.stock > 0 ? 'Acquista' : 'Non disponibile'}
                    </button>
                </div>
            `;
        });
    }

    async function buyItem(id) {
        const res = await fetch(`${API_BASE}/buy`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ productId: id })
        });
        const data = await res.json();
        if (res.ok) { notify(data.message); fetchData(); }
        else { notify(data.error, true); }
    }

    async function adminAddCredits() {
        await fetch(`${API_BASE}/admin/credits`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ amount: 50 })
        });
        notify("Crediti assegnati!");
        fetchData();
    }

    async function adminAddProduct() {
        const name = document.getElementById('p-name').value;
        const price = document.getElementById('p-price').value;
        const stock = document.getElementById('p-stock').value;
        
        await fetch(`${API_BASE}/admin/products`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, price, stock })
        });
        notify("Prodotto creato!");
        fetchData();
    }

    fetchData(); // Caricamento iniziale
</script>

</body>
</html>
